# Optional manual deploy — production autodeploy is Vercel ↔ GitHub on push to `main`.
# Project: fracti-verse/psw-vibelandia-sing13 · production host: psw-vibelandia-sing13-nine.vercel.app
# Custom domain (one-time in Vercel UI): www.ssvibelandiaquestfest24x365.com
#
# Run this workflow only if you need a CLI deploy and have VERCEL_TOKEN set in repo secrets.

name: Deploy to Vercel (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build QUESTFEST Bridge (React)
        run: npm run build:questfest-bridge

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_maBDMCkpaNwjZQ52f14MR3M4
          VERCEL_PROJECT_ID: prj_Ocm9lo8BnghKtAL41KdSD6zxBnWo
        run: npx vercel@latest deploy --prod --yes
