# Optional manual deploy — production autodeploy is Vercel ↔ GitHub on push to `main`.
# Team: fractiai · project: psw-vibelandia-sing13 · host: psw-vibelandia-sing13-nine.vercel.app
# Custom domain: www.ssvibelandiaquestfest24x365.com
#
# GitHub secrets (FractiAI team): VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

name: Deploy to Vercel (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build QUESTFEST Bridge (React)
        run: npm run build:questfest-bridge

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest deploy --prod --yes
