<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" role="img" aria-labelledby="title desc">
  <title id="title">VALETPRU-ASIC simulator-qualified floorplan concept</title>
  <desc id="desc">Stylized chip die: dark substrate, gold interconnect, teal accent blocks representing ILL and FHE regions.</desc>
  <defs>
    <linearGradient id="sub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1528"/>
      <stop offset="100%" style="stop-color:#050a12"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="50%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#8a7020"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="400" fill="url(#sub)"/>
  <rect x="40" y="40" width="560" height="320" rx="14" fill="#060d18" stroke="url(#gold)" stroke-width="2"/>
  <!-- package bond fingers -->
  <g fill="none" stroke="#3d4f66" stroke-width="3">
    <path d="M40 80 H20 M40 120 H15 M40 160 H20 M40 200 H15 M40 240 H20 M40 280 H15 M40 320 H20"/>
    <path d="M600 80 H620 M600 120 H625 M600 160 H620 M600 200 H625 M600 240 H620 M600 280 H625 M600 320 H620"/>
    <path d="M120 40 V20 M200 40 V15 M280 40 V20 M360 40 V15 M440 40 V20 M520 40 V15"/>
    <path d="M120 360 V380 M200 360 V385 M280 360 V380 M360 360 V385 M440 360 V380 M520 360 V385"/>
  </g>
  <!-- core blocks -->
  <rect x="72" y="72" width="220" height="180" rx="6" fill="rgba(45,212,191,0.12)" stroke="#2dd4bf" stroke-width="1.2" filter="url(#glow)"/>
  <text x="182" y="108" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" letter-spacing="0.15em">ILL ť RIX CORE</text>
  <rect x="308" y="72" width="260" height="180" rx="6" fill="rgba(212,175,55,0.1)" stroke="url(#gold)" stroke-width="1.2"/>
  <text x="438" y="108" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" letter-spacing="0.15em">FHE ť 13-FORCE</text>
  <!-- routing -->
  <g fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.85">
    <path d="M292 150 H308 M292 170 H308 M292 190 H308"/>
    <path d="M100 200 H520 M100 220 H500 M120 240 H480"/>
  </g>
  <rect x="72" y="268" width="496" height="76" rx="6" fill="rgba(103,232,249,0.06)" stroke="rgba(103,232,249,0.35)" stroke-width="1"/>
  <text x="320" y="298" fill="#67e8f9" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle" letter-spacing="0.2em">SAOS ť FRACTICHAIN ť PHI BUS</text>
  <text x="320" y="318" fill="#64748b" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">CONCEPT FLOORPLAN ť SIMULATOR-QUALIFIED POSTURE</text>
  <text x="320" y="352" fill="#d4af37" font-family="system-ui,sans-serif" font-size="12" text-anchor="middle" letter-spacing="0.25em" font-weight="600">VALETPRU-ASIC ť PEFF v2.0 TRACK</text>
</svg>
