<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bridge Tower · 8s tease preview</title>
    <link rel="stylesheet" href="/interfaces/bridge-tower-billboard.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f0824;
        padding: 2rem;
      }
      h1 {
        font-family: system-ui, sans-serif;
        color: #ffd54a;
        font-size: 1rem;
        letter-spacing: 0.12em;
        text-align: center;
        margin: 0 0 1rem;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>BRIDGE TOWER · YOUTUBE LOOP</h1>
      <aside class="qf-bridge-tower" aria-label="Holographic AI OS newscast tease">
        <p class="qf-bridge-tower__label">BRIDGE TOWER · LIVE BILLBOARD</p>
        <div class="qf-bridge-tower__bezel">
          <div class="qf-bridge-tower__screen">
            <iframe
              class="qf-bridge-tower__embed"
              src="https://www.youtube.com/embed/IRgS6QcPK8o?autoplay=1&amp;mute=1&amp;loop=1&amp;playlist=IRgS6QcPK8o&amp;controls=0&amp;modestbranding=1&amp;playsinline=1&amp;rel=0"
              title="Bridge tower live feed"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
            ></iframe>
            <div class="qf-bridge-tower__scan" aria-hidden></div>
            <div class="qf-bridge-tower__glow" aria-hidden></div>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
