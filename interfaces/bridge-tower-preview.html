<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bridge Tower · 8s tease preview</title>
    <link rel="stylesheet" href="/interfaces/bridge-tower-billboard.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f0824;
        padding: 2rem;
      }
      h1 {
        font-family: system-ui, sans-serif;
        color: #ffd54a;
        font-size: 1rem;
        letter-spacing: 0.12em;
        text-align: center;
        margin: 0 0 1rem;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>BRIDGE TOWER · 8s MP4 LOOP</h1>
      <aside class="qf-bridge-tower" aria-label="Holographic AI OS newscast tease">
        <p class="qf-bridge-tower__label">BRIDGE TOWER · LIVE BILLBOARD</p>
        <div class="qf-bridge-tower__bezel">
          <div class="qf-bridge-tower__screen">
            <video
              class="qf-bridge-tower__video"
              src="/interfaces/assets/bridge-tower-holographic-ai-os-tease.mp4"
              poster="/interfaces/assets/holographic-ai-os-newscast-frame.png"
              width="640"
              height="360"
              autoplay
              muted
              loop
              playsinline
              controls
              preload="auto"
            ></video>
            <div class="qf-bridge-tower__scan" aria-hidden></div>
            <div class="qf-bridge-tower__glow" aria-hidden></div>
          </div>
        </div>
      </aside>
    </div>
  </body>
</html>
