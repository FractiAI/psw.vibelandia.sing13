<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#060b15" />
  <title>Reader · SS Vibelandia</title>
  <meta name="description" content="Technical documents for SS Vibelandia QUESTFEST." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060b15;
      --line: rgba(212, 175, 55, 0.22);
      --gold: #e8d089;
      --foam: #7dd3c0;
      --text: #e8edf0;
      --muted: #94a3b8;
      --prose: 42rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
      font-size: 1.0625rem;
      padding-bottom: 4rem;
    }
    .wrap {
      max-width: calc(var(--prose) + 4rem);
      margin: 0 auto;
      padding: max(1rem, env(safe-area-inset-top)) 1.35rem max(2rem, env(safe-area-inset-bottom));
    }
    .skin-nav {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--line);
    }
    .skin-nav a {
      color: var(--foam);
      text-decoration: none;
    }
    .skin-nav a:hover { text-decoration: underline; color: var(--gold); }
    .skin-nav span.dot { margin: 0 0.45rem; opacity: 0.55; user-select: none; }

    .doc-head {
      margin-bottom: 2rem;
    }
    .doc-head h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3.5vw, 1.85rem);
      font-weight: 700;
      color: var(--gold);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .status {
      color: var(--muted);
      font-size: 0.9375rem;
      margin: 0 0 1rem;
    }

    .card {
      border-top: 1px solid var(--line);
      padding-top: 1.75rem;
    }

    /* Body copy — tuned for long reads */
    .content {
      max-width: var(--prose);
      font-size: 1.0625rem;
      line-height: 1.75;
      letter-spacing: 0.01em;
    }
    .content :first-child { margin-top: 0; }
    .content h1, .content h2, .content h3, .content h4 {
      color: var(--gold);
      font-weight: 700;
      line-height: 1.3;
      margin: 2.25rem 0 0.65rem;
      letter-spacing: -0.02em;
    }
    .content h1 { font-size: 1.35rem; }
    .content h2 { font-size: 1.22rem; margin-top: 2rem; padding-bottom: 0.35rem; border-bottom: 1px solid rgba(212, 175, 55, 0.15); }
    .content h3 { font-size: 1.08rem; color: #f0e6c8; margin-top: 1.5rem; }
    .content h4 { font-size: 1rem; color: #cbd5e1; }
    .content p, .content li {
      color: var(--text);
      margin: 0 0 1rem;
    }
    .content ul, .content ol {
      margin: 0 0 1rem;
      padding-left: 1.35rem;
    }
    .content li { margin-bottom: 0.35rem; }
    .content a {
      color: var(--foam);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .content a:hover { color: var(--gold); }
    .content img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 1.25rem 0;
      border-radius: 10px;
      border: 1px solid rgba(212, 175, 55, 0.18);
    }
    .content pre {
      overflow: auto;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(94, 234, 212, 0.15);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      font-size: 0.88rem;
      line-height: 1.55;
      margin: 1rem 0;
    }
    .content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
      background: rgba(15, 23, 42, 0.55);
      padding: 0.12em 0.35em;
      border-radius: 4px;
    }
    .content pre code { background: none; padding: 0; }
    .content table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      margin: 1rem 0;
      font-size: 0.94rem;
    }
    .content th, .content td {
      border: 1px solid rgba(148, 163, 184, 0.22);
      padding: 0.5rem 0.65rem;
      text-align: left;
    }
    .content blockquote {
      margin: 1.25rem 0;
      padding: 0.65rem 1rem;
      border-left: 3px solid rgba(212, 175, 55, 0.45);
      background: rgba(212, 175, 55, 0.06);
      color: #e2e8f0;
    }
    .content hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 2rem 0;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <nav class="skin-nav" aria-label="Site">
      <a href="/">QUESTFEST</a><span class="dot" aria-hidden="true">·</span>
      <a href="/hood">Look under the hood</a><span class="dot" aria-hidden="true">·</span>
      <a href="/interfaces/look-at-the-sun.html">Look at the Sun</a>
    </nav>

    <header class="doc-head">
      <h1 id="title">Loading…</h1>
    </header>

    <section class="card">
      <p class="status" id="status">Loading document…</p>
      <article id="content" class="content" aria-live="polite"></article>
    </section>
  </main>

  <script>
    (function () {
      var q = new URLSearchParams(window.location.search);
      var id = q.get('id');
      var titleEl = document.getElementById('title');
      var statusEl = document.getElementById('status');
      var contentEl = document.getElementById('content');

      if (!id) {
        titleEl.textContent = 'Document reader';
        statusEl.textContent = 'Choose a document from Under the hood or Look at the Sun.';
        return;
      }

      var legacyDoc = q.get('doc');
      if (legacyDoc && window.history && window.history.replaceState) {
        var nu = new URL(window.location.href);
        nu.searchParams.delete('doc');
        nu.searchParams.delete('title');
        nu.searchParams.set('id', id || 'rev-egs-hhf-mythos');
        window.history.replaceState({}, '', nu.pathname + nu.search);
      }

      function showError(msg) {
        statusEl.textContent = msg || 'Could not load this document.';
      }

      var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
      var timeout = controller
        ? window.setTimeout(function () {
            controller.abort();
            showError('Document load timed out. Retry or open /api/whitepaper?id=' + encodeURIComponent(id));
          }, 15000)
        : null;

      fetch('/api/whitepaper?id=' + encodeURIComponent(id), controller ? { signal: controller.signal } : {})
        .then(function (r) {
          return r.json().then(function (data) {
            if (!r.ok || !data.ok) throw new Error(data.message || data.code || 'load_failed');
            return data;
          });
        })
        .then(function (data) {
          if (timeout) window.clearTimeout(timeout);
          if (data.redirect) {
            window.location.replace(data.redirect);
            return;
          }
          titleEl.textContent = data.title || id;
          statusEl.remove();
          contentEl.innerHTML = data.html || '';
        })
        .catch(function (err) {
          if (timeout) window.clearTimeout(timeout);
          showError(err && err.name === 'AbortError' ? 'Timed out loading document.' : 'Could not load this document.');
        });
    })();
  </script>
</body>
</html>
