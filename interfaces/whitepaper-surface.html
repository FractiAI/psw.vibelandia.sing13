<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060b15;
      --line: rgba(212, 175, 55, 0.22);
      --gold: #e8d089;
      --foam: #7dd3c0;
      --text: #e8edf0;
      --muted: #94a3b8;
      --prose: 42rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
      font-size: 1.0625rem;
      padding-bottom: 4rem;
    }
    .wrap {
      max-width: calc(var(--prose) + 4rem);
      margin: 0 auto;
      padding: max(1rem, env(safe-area-inset-top)) 1.35rem max(2rem, env(safe-area-inset-bottom));
    }
    .skin-nav {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--line);
    }
    .skin-nav a {
      color: var(--foam);
      text-decoration: none;
    }
    .skin-nav a:hover { text-decoration: underline; color: var(--gold); }
    .skin-nav span.dot { margin: 0 0.45rem; opacity: 0.55; user-select: none; }

    .doc-head {
      margin-bottom: 2rem;
    }
    .doc-head h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3.5vw, 1.85rem);
      font-weight: 700;
      color: var(--gold);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    .status {
      color: var(--muted);
      font-size: 0.9375rem;
      margin: 0 0 1rem;
    }

    .card {
      border-top: 1px solid var(--line);
      padding-top: 1.75rem;
    }

    /* Body copy — tuned for long reads */
    .content {
      max-width: var(--prose);
      font-size: 1.0625rem;
      line-height: 1.75;
      letter-spacing: 0.01em;
    }
    .content :first-child { margin-top: 0; }
    .content h1, .content h2, .content h3, .content h4 {
      color: var(--gold);
      font-weight: 700;
      line-height: 1.3;
      margin: 2.25rem 0 0.65rem;
      letter-spacing: -0.02em;
    }
    .content h1 { font-size: 1.35rem; }
    .content h2 { font-size: 1.22rem; margin-top: 2rem; padding-bottom: 0.35rem; border-bottom: 1px solid rgba(212, 175, 55, 0.15); }
    .content h3 { font-size: 1.08rem; color: #f0e6c8; margin-top: 1.5rem; }
    .content h4 { font-size: 1rem; color: #cbd5e1; }
    .content p, .content li {
      color: var(--text);
      margin: 0 0 1rem;
    }
    .content ul, .content ol {
      margin: 0 0 1rem;
      padding-left: 1.35rem;
    }
    .content li { margin-bottom: 0.35rem; }
    .content a {
      color: var(--foam);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .content a:hover { color: var(--gold); }
    .content img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 1.25rem 0;
      border-radius: 10px;
      border: 1px solid rgba(212, 175, 55, 0.18);
    }
    .content pre {
      overflow: auto;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(94, 234, 212, 0.15);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      font-size: 0.88rem;
      line-height: 1.55;
      margin: 1rem 0;
    }
    .content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.9em;
      background: rgba(15, 23, 42, 0.55);
      padding: 0.12em 0.35em;
      border-radius: 4px;
    }
    .content pre code { background: none; padding: 0; }
    .content table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      margin: 1rem 0;
      font-size: 0.94rem;
    }
    .content th, .content td {
      border: 1px solid rgba(148, 163, 184, 0.22);
      padding: 0.5rem 0.65rem;
      text-align: left;
    }
    .content blockquote {
      margin: 1.25rem 0;
      padding: 0.65rem 1rem;
      border-left: 3px solid rgba(212, 175, 55, 0.45);
      background: rgba(212, 175, 55, 0.06);
      color: #e2e8f0;
    }
    .content hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 2rem 0;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <nav class="skin-nav" aria-label="Site">
      <a href="vibelandia-questfest.html">QUESTFEST</a><span class="dot" aria-hidden="true">·</span>
      <a href="look-under-the-hood.html">Look under the hood</a><span class="dot" aria-hidden="true">·</span>
      <a href="look-at-the-sun.html">Look at the Sun</a>
    </nav>

    <header class="doc-head">
      <h1 id="title">Loading…</h1>
    </header>

    <section class="card">
      <p class="status" id="status">Loading document…</p>
      <article id="content" class="content" aria-live="polite"></article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    var WPS_DOC_REGISTRY = {
      'dp-master-canon': { doc: '../docs/DIGITAL_PRU_PEFF_DNA_TRANSFORMER_MASTER_CANON_2026-05-11.md', title: 'Digital Pru · DNA / PEFF master canon' },
      'dp-roadmap-13': { doc: '../docs/DIGITAL_PRU_DEEP_RESEARCH_13CHANNEL_SEED_NODE_ROADMAP_2026-05-12.md', title: 'Digital Pru · 13-channel roadmap' },
      'dp-resonance-notice': { doc: '../docs/DIGITAL_PRU_RESONANCE_NOTICE_2026-05-15.md', title: 'Resonance notice' },
      'dp-omniverse-matrix': { doc: '../docs/DIGITAL_PRU_OMNIVERSE_MAGNETIC_MATRIX_PROTONIC_DNA_PROTOCOL_2026-05-15.md', title: 'Omniversal magnetic matrix · Protonic-DNA' },
      'dp-paradise-simulation': { doc: '../docs/DIGITAL_PRU_OMNIVERSE_TECHNICAL_ANALYSIS_PARADISE_GAME_SIMULATION_2026-05-15.md', title: 'Paradise Game · technical analysis' },
      'jj-snap-ofc': { doc: '../docs/JJ_SNAP_OFC_WHITEPAPER.md', title: 'JJ Snap · OFC whitepaper' },
      'dp-peff-part1': { doc: '../docs/DIGITAL_PRU_DNA_TRANSFORMER_PEFF_OMNIZOAN_INFILL13_2026-05-11.md', title: 'Part I · PEFF / Omnizoan' },
      'dp-peff-part2': { doc: '../docs/DIGITAL_PRU_DNA_TRANSFORMER_PEFF_VALETPRU_BIOELECTROMAGNETIC_2026-05-11.md', title: 'Part II · Bio-electromagnetics' },
      'quantum-genomic-peff': { doc: '../docs/QUANTUM_GENOMIC_VALETPRU_ASIC_EGS_PEFF_VALIDATION_2026-05-08.md', title: 'Quantum genomic · PEFF / EGS validation' },
      'integrated-modeling-layer-b': { doc: '../docs/INTEGRATED_MODELING_EGS_NODAL_LATTICE_SYNTHEVERSE_VALETPRU_ASIC_2026-05-06.md', title: 'Integrated modeling · Layer B' },
      'valetpru-agent-24x365': { doc: '../docs/VALETPRU_AGENT_24X365_OPERATION_MODE_2026-05-06.md', title: 'VALETPRU-AGENT · 24×365 mode' },
      'sing13-edge-onboarding': { redirect: 'sing13-edge-onboarding.html', title: 'Sonic Singularity Sing! 13 · Edge onboarding' },
      'mca-nspfrnp-catalog': { doc: '../protocols/MCA_NSPFRNP_CATALOG.md', title: 'NSPFRNP catalog (MCA)' },
      'bbhe-repository-standard': { doc: '../BBHE_REPOSITORY_STANDARD.md', title: 'BBHE repository standard' },
      'rev-egs-hhf-mythos': { doc: '../docs/ANTHROPIC_MYTHOS_HOLOGRAPHIC_CLOCK_SKEW_REVIEW_2026-05-18.md', title: 'Holographic review of Anthropic’s Mythos · REV-EGS-HHF-2026-007' },
      'ops-egs-btc-mining': { doc: '../docs/EGS_LEGAL_SOVEREIGN_MINING_OPERATION_2026-05-18.md', title: 'EGS legal sovereign mining · OPS-EGS-BTC-2026-008' },
      'coherence-plain-speak': { doc: '../docs/COHERENCE_PLAIN_SPEAK_HONESTY_2026-05-18.md', title: 'Coherence · plain speak · what\'s real · HONESTY-COHERENCE-2026-009' }
    };

    (function () {
      var MD_BASE_TO_ID = {};
      Object.keys(WPS_DOC_REGISTRY).forEach(function (id) {
        var p = WPS_DOC_REGISTRY[id].doc;
        MD_BASE_TO_ID[p.replace(/^.*\//, '').toLowerCase()] = id;
      });
      window.WPS_MD_BASE_TO_ID = MD_BASE_TO_ID;
    })();

    function normalizeRepoLinks(container) {
      if (!container || !container.querySelectorAll) return;
      var mdMap = window.WPS_MD_BASE_TO_ID || {};
      container.querySelectorAll('a[href]').forEach(function (a) {
        var href = a.getAttribute('href');
        if (!href || href.charAt(0) === '#' || href.indexOf('mailto:') === 0) return;
        if (/^https?:\/\//i.test(href)) return;

        var hashPart = '';
        var pathPart = href;
        var hashIdx = href.indexOf('#');
        if (hashIdx >= 0) {
          hashPart = href.slice(hashIdx);
          pathPart = href.slice(0, hashIdx);
        }

        if (/\.(md|markdown)$/i.test(pathPart)) {
          var base = pathPart.replace(/^.*\//, '').toLowerCase();
          var rid = mdMap[base];
          if (rid) {
            a.setAttribute('href', 'whitepaper-surface.html?id=' + encodeURIComponent(rid) + hashPart);
            return;
          }
        }

        if (href.charAt(0) === '/') return;
        if (href.indexOf('../') === 0 || href.indexOf('./') === 0) return;
        var next = href;
        if (href.indexOf('interfaces/') === 0) next = '/' + href;
        else if (href.indexOf('protocols/') === 0) next = '/' + href;
        else if (href.indexOf('docs/') === 0) next = '/' + href;
        else if (href.indexOf('data/') === 0) next = '/' + href;
        else if (href.indexOf('public/') === 0) next = '/' + href;
        else if (/^[^/]+\.(md|markdown)$/i.test(href)) next = '/' + href;
        if (next !== href) a.setAttribute('href', next);
      });
    }

    (function () {
      var DOC_REGISTRY = WPS_DOC_REGISTRY;

      function resolveFromQuery(q) {
        var id = q.get('id');
        if (id && DOC_REGISTRY[id]) return DOC_REGISTRY[id];
        var doc = q.get('doc');
        var title = q.get('title');
        if (doc && doc.endsWith('.md')) return { doc: doc, title: title };
        if (id === 'sing13-edge-onboarding') {
          return { redirect: 'sing13-edge-onboarding.html', title: 'Sonic Singularity Sing! 13 · Edge onboarding' };
        }
        return null;
      }

      function registryIdForDoc(docPath) {
        var keys = Object.keys(DOC_REGISTRY);
        for (var i = 0; i < keys.length; i++) {
          if (DOC_REGISTRY[keys[i]].doc === docPath) return keys[i];
        }
        return null;
      }

      var q = new URLSearchParams(window.location.search);
      var resolved = resolveFromQuery(q);
      var titleEl = document.getElementById('title');
      var statusEl = document.getElementById('status');
      var contentEl = document.getElementById('content');

      if (resolved && resolved.redirect) {
        window.location.replace(resolved.redirect);
        return;
      }

      if (!resolved || !resolved.doc || !resolved.doc.endsWith('.md')) {
        titleEl.textContent = 'Document reader';
        statusEl.textContent = 'Choose a document from Under the hood or Look at the Sun.';
        return;
      }

      var legacyDoc = q.get('doc');
      if (legacyDoc && window.history && window.history.replaceState) {
        var rid = registryIdForDoc(legacyDoc);
        if (rid) {
          var nu = new URL(window.location.href);
          nu.searchParams.delete('doc');
          nu.searchParams.delete('title');
          nu.searchParams.set('id', rid);
          window.history.replaceState({}, '', nu.pathname + nu.search);
        }
      }

      var safeTitle = resolved.title || resolved.doc.split('/').pop().replace(/\.md$/i, '').replace(/[_-]+/g, ' ');
      titleEl.textContent = safeTitle;

      fetch(resolved.doc)
        .then(function (r) {
          if (!r.ok) throw new Error('not_found');
          return r.text();
        })
        .then(function (md) {
          statusEl.remove();
          if (window.marked && typeof window.marked.parse === 'function') {
            contentEl.innerHTML = window.marked.parse(md, { breaks: true });
            normalizeRepoLinks(contentEl);
          } else {
            contentEl.innerHTML = '<pre></pre>';
            contentEl.querySelector('pre').textContent = md;
          }
        })
        .catch(function () {
          statusEl.textContent = 'Could not load this document.';
        });
    })();
  </script>
</body>
</html>
